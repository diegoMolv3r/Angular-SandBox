<ngx-scanner-qrcode #action="scanner" (event)="onScan($event)">
</ngx-scanner-qrcode>

<h1>
    {{valorQR}}
</h1>

@if (action.isLoading) {
<p>⌛ Loading...</p>
}
@else {
<div class="controles">
    <button (click)="action.isStart ? action.stop() : action.start()" class="btn-secundario">
        {{action.isStart ? 'Stop' : 'Start'}}
    </button>

    @if (action.isStart) {
    <button (click)="voltearCamara()" class="btn-voltear" title="Voltear cámara">
        🔄 Voltear
    </button>
    }
</div>
}
